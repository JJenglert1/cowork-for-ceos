<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Event Prompt Pack Preview</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121931;
      --text: #e8ecff;
      --muted: #aab4dc;
      --accent: #6ee7b7;
      --code: #0f1630;
      --border: #28335e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 700px at 20% -10%, #1a2450 0%, var(--bg) 55%);
    }
    .wrap {
      max-width: 980px;
      margin: 32px auto;
      padding: 0 20px 40px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .meta {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .card {
      background: color-mix(in oklab, var(--card) 88%, black);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 26px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    button {
      border: 1px solid var(--border);
      background: #19224a;
      color: var(--text);
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      border-color: #3d4d8d;
    }
    #content h1, #content h2, #content h3 {
      line-height: 1.25;
      margin: 1.3em 0 0.55em;
    }
    #content h1 { font-size: 1.8rem; color: var(--accent); margin-top: 0; }
    #content h2 { font-size: 1.35rem; }
    #content h3 { font-size: 1.1rem; color: #cbd5ff; }
    #content p {
      margin: 0.5em 0 0.85em;
      line-height: 1.55;
      color: #ecf0ff;
    }
    #content ul {
      margin: 0.3em 0 0.9em 1.2em;
      padding: 0;
    }
    #content li {
      margin: 0.35em 0;
      line-height: 1.5;
      color: #e4e9ff;
    }
    #content code {
      background: rgba(110, 231, 183, 0.13);
      border: 1px solid rgba(110, 231, 183, 0.25);
      border-radius: 6px;
      padding: 0.12em 0.35em;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.92em;
    }
    #content pre {
      margin: 0.85em 0 1.2em;
      background: var(--code);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      overflow: auto;
    }
    #content pre code {
      background: transparent;
      border: 0;
      padding: 0;
      color: #d6e0ff;
      white-space: pre;
      display: block;
      font-size: 0.9rem;
      line-height: 1.45;
    }
    .error {
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(255, 96, 96, 0.14);
      border: 1px solid rgba(255, 96, 96, 0.4);
      color: #ffd0d0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <div class="title">Live Event Prompt Pack</div>
        <div class="meta">Preview for <code>live-event-prompt-pack.md</code></div>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <select id="docSelect" style="background:#19224a;color:#e8ecff;border:1px solid #28335e;border-radius:8px;padding:7px 10px;">
          <option value="./live-event-prompt-pack.md">Prompt Pack</option>
          <option value="./workshop-attendee-guide.md">Workshop Guide</option>
          <option value="./live-event-outline.md">Event Outline</option>
        </select>
        <button id="reloadBtn" type="button">Reload</button>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div id="docLabel">Simple markdown preview</div>
      </div>
      <main id="content" aria-live="polite"></main>
    </div>
  </div>

  <script>
    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function renderInline(text) {
      const escaped = escapeHtml(text);
      return escaped.replace(/`([^`]+)`/g, "<code>$1</code>");
    }

    function renderMarkdown(md) {
      const lines = md.replace(/\r\n/g, "\n").split("\n");
      const out = [];
      let i = 0;
      let inCode = false;
      let codeBuffer = [];
      let listOpen = false;

      function closeList() {
        if (listOpen) {
          out.push("</ul>");
          listOpen = false;
        }
      }

      while (i < lines.length) {
        const line = lines[i];

        if (line.startsWith("```")) {
          closeList();
          if (!inCode) {
            inCode = true;
            codeBuffer = [];
          } else {
            inCode = false;
            out.push("<pre><code>" + escapeHtml(codeBuffer.join("\n")) + "</code></pre>");
          }
          i++;
          continue;
        }

        if (inCode) {
          codeBuffer.push(line);
          i++;
          continue;
        }

        if (line.trim() === "") {
          closeList();
          i++;
          continue;
        }

        const hMatch = line.match(/^(#{1,3})\s+(.*)$/);
        if (hMatch) {
          closeList();
          const level = hMatch[1].length;
          out.push(`<h${level}>${renderInline(hMatch[2])}</h${level}>`);
          i++;
          continue;
        }

        const liMatch = line.match(/^\s*-\s+(.*)$/);
        if (liMatch) {
          if (!listOpen) {
            out.push("<ul>");
            listOpen = true;
          }
          out.push(`<li>${renderInline(liMatch[1])}</li>`);
          i++;
          continue;
        }

        closeList();
        out.push(`<p>${renderInline(line)}</p>`);
        i++;
      }

      closeList();
      return out.join("\n");
    }

    async function load() {
      const contentEl = document.getElementById("content");
      const docSelect = document.getElementById("docSelect");
      const docLabel = document.getElementById("docLabel");
      const targetFile = docSelect.value;
      contentEl.innerHTML = "<p>Loading...</p>";
      try {
        const response = await fetch(targetFile, { cache: "no-store" });
        if (!response.ok) throw new Error("Could not load markdown file.");
        const md = await response.text();
        docLabel.textContent = "Previewing: " + targetFile.replace("./", "");
        contentEl.innerHTML = renderMarkdown(md);
      } catch (error) {
        contentEl.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>
          <p class="meta">Tip: if opened directly as a file, run a local server, e.g. <code>python3 -m http.server</code> from this folder.</p>`;
      }
    }

    document.getElementById("reloadBtn").addEventListener("click", load);
    document.getElementById("docSelect").addEventListener("change", load);
    load();
  </script>
</body>
</html>
